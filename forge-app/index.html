<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#010102" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="FORGE — World-class AI fitness coaching in your pocket" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#010102" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>FORGE — AI Fitness Coaching</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html { height: 100%; overflow: hidden; }
      body { height: 100%; overflow: hidden; background: #010102; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      #root { height: 100%; overflow: hidden; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(92, 224, 208, 0.15); border-radius: 4px; }
      input, textarea, select { font-family: inherit; }

      @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      @keyframes pulse-glow { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.05); opacity: 1; } }
      @keyframes fade-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes splash-load { from { width: 0%; } to { width: 100%; } }
      @keyframes streak-pulse { 0%, 100% { text-shadow: 0 0 20px rgba(245,158,11,0.4); } 50% { text-shadow: 0 0 40px rgba(245,158,11,0.8); } }

      /* Cinematic splash */
      #forge-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #010102; transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #forge-splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      .splash-glow {
        position: absolute; width: 400px; height: 400px; border-radius: 50%;
        background: radial-gradient(circle, rgba(92,224,208,0.06), transparent 70%);
        animation: breathe 3s ease-in-out infinite;
      }
      .splash-logo {
        width: 88px; height: 88px; border-radius: 26px; position: relative; z-index: 1;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, rgba(92,224,208,0.1), rgba(92,224,208,0.02));
        border: 1px solid rgba(92,224,208,0.15);
        box-shadow: 0 0 80px rgba(92,224,208,0.12), inset 0 1px 0 rgba(255,255,255,0.04);
        animation: breathe 2.5s ease-in-out infinite;
      }
      .splash-logo span {
        font-family: 'Cinzel', serif; font-size: 40px; font-weight: 800;
        color: #5ce0d0; text-shadow: 0 0 30px rgba(92,224,208,0.5);
      }
      .splash-title {
        font-family: 'Cinzel', serif; font-size: 32px; font-weight: 800; position: relative; z-index: 1;
        color: #f0f0f2; letter-spacing: 0.14em; margin-top: 24px;
        animation: fade-up 0.8s ease 0.3s both;
      }
      .splash-sub {
        font-family: 'JetBrains Mono', monospace; font-size: 9px; position: relative; z-index: 1;
        color: #5ce0d0; letter-spacing: 0.3em; margin-top: 8px;
        animation: fade-up 0.8s ease 0.5s both;
      }
      .splash-bar {
        width: 140px; height: 2px; border-radius: 2px; margin-top: 36px;
        background: rgba(92,224,208,0.08); overflow: hidden; position: relative; z-index: 1;
        animation: fade-up 0.8s ease 0.7s both;
      }
      .splash-bar-fill {
        height: 100%; border-radius: 2px;
        background: linear-gradient(90deg, #5ce0d0, #40b8a8);
        box-shadow: 0 0 10px rgba(92,224,208,0.5);
        animation: splash-load 1.6s ease 0.8s both;
      }

      /* Desktop device frame */
      @media (min-width: 768px) {
        body { display: flex; align-items: center; justify-content: center; background: #000; }
        #root {
          max-width: 430px; max-height: 932px; width: 100%; height: 100%;
          border-radius: 40px; overflow: hidden; position: relative;
          box-shadow:
            0 0 0 1px rgba(92,224,208,0.06),
            0 25px 80px rgba(0,0,0,0.8),
            0 0 120px rgba(92,224,208,0.03);
          border: 1px solid rgba(255,255,255,0.04);
        }
      }
      @media (min-width: 1024px) {
        #root {
          border: 1px solid rgba(92,224,208,0.08);
          box-shadow:
            0 0 0 1px rgba(92,224,208,0.06),
            0 40px 100px rgba(0,0,0,0.9),
            0 0 200px rgba(92,224,208,0.04);
        }
      }
    </style>
  </head>
  <body>
    <div id="forge-splash">
      <div class="splash-glow"></div>
      <div class="splash-logo"><span>F</span></div>
      <div class="splash-title">FORGE</div>
      <div class="splash-sub">AI-POWERED COACHING</div>
      <div class="splash-bar"><div class="splash-bar-fill"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var s = document.getElementById('forge-splash');
          if (s) { s.classList.add('hidden'); setTimeout(function() { s.remove(); }, 600); }
        }, 2200);
      });
    </script>
  </body>
</html>
